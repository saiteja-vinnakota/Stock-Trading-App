<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">

  <!-- Background -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="#0F172A"></rect>

  <!-- Grid -->
  <g stroke="#1E293B" stroke-width="1">
    <line x1="14" y1="18" x2="14" y2="50"></line>
    <line x1="26" y1="18" x2="26" y2="50"></line>
    <line x1="38" y1="18" x2="38" y2="50"></line>
    <line x1="50" y1="18" x2="50" y2="50"></line>

    <line x1="10" y1="22" x2="54" y2="22"></line>
    <line x1="10" y1="34" x2="54" y2="34"></line>
    <line x1="10" y1="46" x2="54" y2="46"></line>
  </g>

  <!-- Green Candlestick -->
  <line x1="20" y1="18" x2="20" y2="42" stroke="#10B981" stroke-width="2"></line>
  <rect x="17" y="24" width="6" height="12" rx="1" fill="#10B981"></rect>

  <!-- Red Candlestick -->
  <line x1="32" y1="20" x2="32" y2="46" stroke="#EF4444" stroke-width="2"></line>
  <rect x="29" y="22" width="6" height="14" rx="1" fill="#EF4444"></rect>

  <!-- Green Candlestick -->
  <line x1="44" y1="14" x2="44" y2="38" stroke="#10B981" stroke-width="2"></line>
  <rect x="41" y="20" width="6" height="12" rx="1" fill="#10B981"></rect>

  <!-- Upward Trend -->
  <polyline points="14,44 24,38 34,40 48,24" fill="none" stroke="#22C55E" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></polyline>

  <!-- Arrow -->
  <polyline points="44,24 48,24 48,28" fill="none" stroke="#22C55E" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></polyline>

</svg>